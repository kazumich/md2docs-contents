name: Deploy contents to XSERVER

on:
  push:
    branches: [main]
  workflow_dispatch:  # 手動実行も可

jobs:
  deploy:
    name: FTP Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: FTP deploy (contents/ + categories.yaml)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:    ${{ secrets.FTP_SERVER }}
          username:  ${{ secrets.FTP_USERNAME }}
          password:  ${{ secrets.FTP_PASSWORD }}
          protocol:  ftps                       # XSERVER は FTPS 推奨
          local-dir: ./
          server-dir: ${{ secrets.FTP_DEPLOY_PATH }}

          # exclude — リポジトリにあるが本番に上げないファイル
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
            **/.github/**

          # 差分のみアップロード (state file は server-dir に置かれる)
          state-name: .ftp-deploy-sync-state.json

          # ログレベル: standard / verbose / minimal
          log-level: standard
          dry-run: false
          dangerous-clean-slate: false   # 既存ファイル全削除の危険操作はオフ
